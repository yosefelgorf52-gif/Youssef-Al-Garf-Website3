<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youssef AI - Gemini Style</title>
    <link rel="stylesheet" href="style.css">
    <!-- إضافة خط عربي احترافي -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-wrapper">
        <aside class="sidebar">
            <div class="logo">Youssef AI</div>
            <button class="new-chat" onclick="location.reload()">+ محادثة جديدة</button>
        </aside>
        
        <main class="chat-area">
            <div id="chat-box">
                <div class="welcome-msg">أهلاً بك يا يوسف! كيف يمكنني مساعدتك اليوم؟</div>
            </div>
            
            <div class="input-zone">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="اكتب استفسارك هنا...">
                    <button onclick="sendMessage()" id="send-btn">إرسال</button>
                </div>
                <div class="footer-note">Youssef AI قد يخطئ في بعض المعلومات.</div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
